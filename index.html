<body>
    <!-- Force-update stale service workers on version bump -->
    <script>
        (function () {
            var SW_VERSION = '3';
            if (localStorage.getItem('sw_version') !== SW_VERSION && 'serviceWorker' in navigator) {
                localStorage.setItem('sw_version', SW_VERSION);
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                    var promises = regs.map(function (r) { return r.unregister(); });
                    return Promise.all(promises);
                }).then(function () {
                    return caches.keys();
                }).then(function (names) {
                    return Promise.all(names.map(function (n) { return caches.delete(n); }));
                }).then(function () {
                    location.reload();
                });
            }
        })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
