name: FE Staging CI/CD

on:
  push:
    branches: ["TESTING"]
  pull_request:
    branches: ["TESTING"]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run E2E if script exists"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mws-app-fe

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: FE Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: ESLint (strict)
        run: |
          if npm run | grep -q " lint"; then
            npm run lint -- --quiet
          elif npm run | grep -q "lint:strict"; then
            npm run lint:strict -- --quiet
          else
            echo "No lint script found, skipping."
          fi

      - name: Unit tests (if available)
        run: |
          if npm run | grep -q " test"; then
            npm test -- --ci
          else
            echo "No unit test script found, skipping."
          fi

      - name: E2E tests (optional, if available)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true' }}
        run: |
          if npm run | grep -q "test:e2e"; then
            npm run test:e2e
          elif npm run | grep -q "test:cypress"; then
            npm run test:cypress
          else
            echo "No e2e script found, skipping."
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: /api/v1

  build_and_push:
    name: Build & Push FE Staging Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/TESTING'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging-latest
            type=sha,prefix=staging-
            type=raw,value=staging-${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE=/api/v1

      - name: Summary
        run: |
          echo "## 🐳 Frontend Staging Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # DEPLOY - Trigger Komodo Redeploy (Staging)
  # ============================================
  deploy:
    name: "Deploy Staging to Komodo"
    runs-on: ubuntu-latest
    needs: [build_and_push]
    if: needs.build_and_push.result == 'success'
    steps:
      - name: Trigger Komodo Redeploy
        run: |
          BODY='{"ref":"refs/heads/TESTING","repository":{"name":"mws-app-fe"},"tag":"staging-latest"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.KOMODO_WEBHOOK_SECRET }}" | awk '{print "sha256="$2}')
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY" \
            "${{ secrets.KOMODO_WEBHOOK_URL }}"
          echo "Komodo staging redeploy triggered successfully"
